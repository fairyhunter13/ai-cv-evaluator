name: Rollback

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to rollback (production only)'
        required: true
        default: 'production'
        type: choice
        options:
          - production

concurrency:
  group: rollback-${{ github.ref }}
  cancel-in-progress: false

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf %s "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Rollback to previous backend color
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} '
            set -e
            cd ~/ai-cv-evaluator

            if [ ! -f docker-compose.prod.yml ]; then
              echo "docker-compose.prod.yml not found; cannot rollback" >&2
              exit 1
            fi

            COLOR_FILE=".active_color"
            if [ -f "$COLOR_FILE" ]; then
              CURRENT_COLOR=$(cat "$COLOR_FILE" | tr -d " \t\r\n")
            else
              if grep -q "backend_green:8080" deploy/nginx/nginx.conf 2>/dev/null; then
                CURRENT_COLOR="green"
              elif grep -q "backend_blue:8080" deploy/nginx/nginx.conf 2>/dev/null; then
                CURRENT_COLOR="blue"
              else
                echo "Could not determine current backend color; aborting rollback" >&2
                exit 1
              fi
            fi

            case "$CURRENT_COLOR" in
              blue) PREV_COLOR="green" ;;
              green) PREV_COLOR="blue" ;;
              *)
                echo "Unknown current color: $CURRENT_COLOR" >&2
                exit 1 ;;
            esac

            echo "Current backend color: $CURRENT_COLOR"
            echo "Target rollback color: $PREV_COLOR"

            PREV_SERVICE="backend_${PREV_COLOR}"
            CURRENT_SERVICE="backend_${CURRENT_COLOR}"

            # Load production env for docker compose
            if [ -f .env.production ]; then
              set -a
              source .env.production
              set +a
            fi

            # Start the previous backend (may be stopped to save memory)
            echo "Starting $PREV_SERVICE..."
            docker compose -f docker-compose.prod.yml up -d "$PREV_SERVICE"

            # Wait for previous backend to become healthy
            echo "Waiting for $PREV_SERVICE to become healthy..."
            for i in {1..24}; do
              HEALTH=$(docker inspect --format="{{.State.Health.Status}}" "ai-cv-evaluator-${PREV_SERVICE}-1" 2>/dev/null || echo "starting")
              echo "Attempt $i/24: Health status = $HEALTH"

              if [ "$HEALTH" = "healthy" ]; then
                echo "$PREV_SERVICE is healthy!"
                break
              fi

              # Also try direct HTTP check
              if docker compose -f docker-compose.prod.yml exec -T "$PREV_SERVICE" curl -fsS --max-time 5 "http://localhost:8080/healthz" >/dev/null 2>&1; then
                echo "$PREV_SERVICE responding to HTTP!"
                break
              fi

              if [ $i -eq 24 ]; then
                echo "ERROR: $PREV_SERVICE failed to become healthy after 2 minutes"
                exit 1
              fi

              sleep 5
            done

            echo "Switching Nginx upstream to $PREV_SERVICE..."

            # Update nginx configs using templates
            if [ -f deploy/nginx/prod-conf.d/app-https.conf.template ]; then
              sed "s|set \$backend_host \"backend_.*:8080\";|set \$backend_host \"${PREV_SERVICE}:8080\";|" \
                deploy/nginx/prod-conf.d/app-https.conf.template > deploy/nginx/prod-conf.d/app-https.conf
            fi

            if [ -f deploy/nginx/prod-conf.d/dashboard.conf.template ]; then
              sed "s|set \$backend_host \"backend_.*:8080\";|set \$backend_host \"${PREV_SERVICE}:8080\";|" \
                deploy/nginx/prod-conf.d/dashboard.conf.template > deploy/nginx/prod-conf.d/dashboard.conf
            fi

            echo "$PREV_COLOR" > "$COLOR_FILE"

            echo "Reloading Nginx..."
            if ! docker compose -f docker-compose.prod.yml exec -T nginx nginx -s reload; then
              echo "Nginx reload failed, restarting container..."
              docker compose -f docker-compose.prod.yml restart nginx
            fi

            echo "Waiting for health via Nginx..."
            for i in {1..30}; do
              if docker compose -f docker-compose.prod.yml exec -T nginx curl -fk https://localhost/healthz >/dev/null 2>&1; then
                echo "Rollback backend is healthy via Nginx"
                break
              fi
              echo "Attempt $i: waiting for /healthz during rollback..."
              sleep 10
            done

            # Stop the current (failed) backend to free memory
            echo "Stopping $CURRENT_SERVICE to free memory..."
            docker compose -f docker-compose.prod.yml stop "$CURRENT_SERVICE" || echo "Warning: Failed to stop $CURRENT_SERVICE"

            echo "=== docker compose ps (after rollback) ==="
            docker compose -f docker-compose.prod.yml ps
          '
